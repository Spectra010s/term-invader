name: Publish and Release Term Invader

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## TERM-INVADER v${{ github.ref_name }}
            
            ### Quick Install
            ```bash
            npm i -g term-invader
            ```
            Play it instantly in your terminal:
            ```bash
            npx term-invader
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
